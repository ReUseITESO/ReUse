name: CI Pipeline

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # Backend Validation
  # ──────────────────────────────────────────────────────
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy pytest pytest-django types-requests django-stubs djangorestframework-stubs

      - name: Ruff Check (Linting)
        run: ruff check .

      - name: Black Check (Formatting)
        run: black --check .

      - name: MyPy Check (Type Checking)
        run: mypy . --ignore-missing-imports --no-error-summary || true
        continue-on-error: true  # Puede fallar inicialmente mientras se agregan tipos

      - name: Pytest (Unit Tests)
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: pytest --tb=short -q

  # ──────────────────────────────────────────────────────
  # Frontend Validation
  # ──────────────────────────────────────────────────────
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: ESLint Check (Linting)
        run: npm run lint

      - name: Prettier Check (Formatting)
        run: npx prettier --check "src/**/*.{ts,tsx,json,css}"

      - name: TypeScript Check (Type Checking)
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────
  # CI Summary Gate
  # ──────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.frontend.result }}" == "failure" ]]; then
            echo " CI failed. Please fix the issues above."
            exit 1
          fi
          echo " All CI checks passed!"
