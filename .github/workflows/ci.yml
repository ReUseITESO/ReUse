name: CI Pipeline

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # Backend Validation
  # ──────────────────────────────────────────────────────
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy pytest pytest-django types-requests django-stubs djangorestframework-stubs

      - name: Check for conflict markers
        run: |
          if grep -rE '^(<{7}|={7}|>{7})( |$)' --include='*.py' --include='*.yml' --include='*.yaml' --include='*.md' .; then
            echo "::error::Conflict markers detected in backend"
            exit 1
          fi

      - name: Ruff Check (Linting)
        run: ruff check .

      - name: Black Check (Formatting)
        run: black --check .

      - name: MyPy Check (Type Checking - advisory)
        run: mypy . --ignore-missing-imports --no-error-summary || true
        continue-on-error: true  # Advisory por ahora, no bloquea

      - name: Pytest (Unit Tests)
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          set +e
          pytest --tb=short -q
          code=$?
          # exit 5 = no tests collected (tolerable)
          if [ $code -eq 5 ]; then
            echo "No tests collected, ignoring"
            exit 0
          fi
          exit $code

  # ──────────────────────────────────────────────────────
  # Frontend Validation
  # ──────────────────────────────────────────────────────
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Check for conflict markers
        run: |
          if grep -rE '^(<{7}|={7}|>{7})( |$)' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' --include='*.json' --include='*.css' src/; then
            echo "::error::Conflict markers detected in frontend"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: ESLint Check (Linting)
        run: npm run lint

      - name: Prettier Check (Formatting)
        run: npx prettier --check "src/**/*.{ts,tsx,json,css}"

      - name: TypeScript Check (Type Checking)
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────
  # CI Summary Gate
  # ──────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.frontend.result }}" == "failure" ]]; then
            echo " CI failed. Please fix the issues above."
            exit 1
          fi
          echo " All CI checks passed!"

  # ──────────────────────────────────────────────────────
  # CD — Deploy to GCP Cloud Run (solo en push a main)
  # ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to GCP
    needs: [ci-gate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      PROJECT_ID: reuse-iteso
      REGION: us-central1
      REGISTRY: us-central1-docker.pkg.dev/reuse-iteso/reuse-repo
      BACKEND_URL: https://backend-674659739241.us-central1.run.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/frontend:latest
          build-args: NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }}/api
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy backend \
            --image=${{ env.REGISTRY }}/backend:latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy frontend \
            --image=${{ env.REGISTRY }}/frontend:latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet

      - name: Print service URLs
        run: |
          echo "Backend: $(gcloud run services describe backend --region=${{ env.REGION }} --format='value(status.url)')"
          echo "Frontend: $(gcloud run services describe frontend --region=${{ env.REGION }} --format='value(status.url)')"
